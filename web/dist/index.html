<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philograph</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header id="header">
        <h1>Philograph</h1>
        <input type="text" id="search-input" placeholder="Search node..." />
        <span id="status">Ready</span>
    </header>
    <main>
        <aside id="sidebar">
            <section id="upload-section">
                <h2>Upload Text</h2>
                <form id="upload-form">
                    <input type="file" id="file-input" accept=".txt,.md,.text" />
                    <button type="submit" id="analyze-btn">Analyze</button>
                </form>
                <div id="progress-bar-container" hidden>
                    <div id="progress-bar"></div>
                    <span id="progress-text"></span>
                </div>
            </section>
            <section id="controls-section" hidden>
                <h2>Parameters</h2>
                <label>Window Size: <input type="range" id="window-size" min="2" max="20" value="5"><span id="window-size-val">5</span></label>
                <label>Min Frequency: <input type="range" id="min-freq" min="1" max="20" value="3"><span id="min-freq-val">3</span></label>
                <label>Max Nodes: <input type="range" id="max-nodes" min="10" max="500" value="150"><span id="max-nodes-val">150</span></label>
                <label>Metric:
                    <select id="metric">
                        <option value="npmi" selected>NPMI</option>
                        <option value="pmi">PMI</option>
                        <option value="jaccard">Jaccard</option>
                        <option value="frequency">Frequency</option>
                    </select>
                </label>
                <button id="export-json">Export JSON</button>
                <button id="export-gexf">Export GEXF</button>
            </section>
            <section id="stats-section" hidden>
                <h2>Statistics</h2>
                <dl id="stats-detail"></dl>
            </section>
            <section id="legend-section" hidden>
                <h2>Communities</h2>
                <div id="community-legend"></div>
            </section>
        </aside>
        <div id="graph-container"></div>
        <aside id="detail-panel" hidden>
            <section id="top-terms-section" hidden>
                <h2>Top Terms</h2>
                <ol id="top-terms-list"></ol>
            </section>
            <h2>Node Detail</h2>
            <dl id="node-detail"></dl>
        </aside>
    </main>
    <script src="/vendor/graphology.min.js"></script>
    <script src="/vendor/sigma.min.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
